name: Guardrails

on:
  push:
    branches:
      - main
      - release/*
      - support/*
  pull_request:
    branches:
      - main

jobs:
  modernui-quality:
    name: Modern UI quality and package
    runs-on: ubuntu-latest

    steps:
      - name: Setup PHP and dependencies
        uses: Icinga/github-actions/.github/actions/php-and-dependencies@ea00fefeee718346f7cf319b61e430243c0a3797
        with:
          php-version: '8.2'
          php-tools: composer, phpcs

      - name: Run PHP guardrails
        run: |
          composer run lint:php
          composer run stan:baseline:guard

      - name: Check generated assets
        run: |
          composer run assets
          git diff --exit-code

      - name: Check JavaScript syntax
        run: |
          node --check public/js/icinga/ux-enhancements.js
          node --check public/js/icinga/behavior/floating-dashlets.js
          node --check public/js/icinga/ui.js

      - name: Check deployment scripts
        run: |
          bash -n bin/build-modernui-assets.sh
          bash -n deployment/modern-ui-package/build-package.sh
          bash -n deployment/modern-ui-package/install.sh

      - name: Build and verify deployment package
        run: bash deployment/modern-ui-package/test-package.sh
