# Include before the generic /icingaweb2 location in the TLS server block.
# Only the files below use filemtime-based cache-busting URLs in layout.phtml.
location ~* ^/icingaweb2/(js/icinga/(?:ux-enhancements|behavior/floating-dashlets)\.js|css/icinga/ux-enhancements\.css)$ {
    alias /usr/share/icingaweb2/public/$1;
    add_header Cache-Control "public, max-age=604800, immutable" always;
    access_log off;
}
